services:
  # ---------------------------------------------------------------------------
  # TimescaleDB — PostgreSQL 15 + TimescaleDB extension
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: vpp-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpp
      POSTGRES_PASSWORD: vpplocal
      POSTGRES_DB: vpp_italia
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpp -d vpp_italia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # API FastAPI — backend VPP
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpp-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vpp:vpplocal@timescaledb:5432/vpp_italia
      DATABASE_POOL_SIZE: "5"
      DATABASE_MAX_OVERFLOW: "10"
      DATABASE_ECHO: "false"
      JWT_SECRET_KEY: dev-secret-change-in-prod-openssl-rand-hex-32
      JWT_ALGORITHM: HS256
      APP_ENV: development
      LOG_LEVEL: INFO
      TIMEZONE: Europe/Rome
      # Marchés — URLs factices pour le dev local (les connecteurs ne sont pas appelés au démarrage)
      GME_API_BASE_URL: http://localhost:9999
      GME_API_USERNAME: dev
      GME_API_PASSWORD: dev
      GME_PARTICIPANT_CODE: IT_DEV_001
      TERNA_API_BASE_URL: http://localhost:9999
      TERNA_CLIENT_ID: dev
      TERNA_CLIENT_SECRET: dev
      TERNA_UPCA_CODE: IT_UPCA_DEV
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ---------------------------------------------------------------------------
  # Frontend React — Vite dev server (hot-reload en local)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-slim
    container_name: vpp-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MOCK_DATA: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Prometheus — scraping des métriques FastAPI (/metrics)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: vpp-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"

  # ---------------------------------------------------------------------------
  # Grafana — dashboards fleet + batteries
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: vpp-grafana
    restart: unless-stopped
    depends_on:
      - timescaledb
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: vpplocal
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"

volumes:
  timescaledb_data:
  prometheus_data:
  grafana_data:
