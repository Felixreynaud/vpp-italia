apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    uid: vpp-timescaledb
    url: timescaledb:5432
    user: vpp
    database: vpp_italia
    secureJsonData:
      password: vpplocal
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    isDefault: true
    editable: false

  - name: Prometheus
    type: prometheus
    uid: vpp-prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: false
    editable: false
