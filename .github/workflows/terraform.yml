name: Deploy Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Environnement cible'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Un seul job Terraform a la fois par environnement
concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-south-1
  TF_DIR: infra/terraform

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-1
          mask-aws-account-id: 'true'

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Create terraform.tfvars
        env:
          TF_ACCOUNT_ID:     ${{ secrets.TF_VAR_AWS_ACCOUNT_ID }}
          TF_ENVIRONMENT:    ${{ inputs.environment }}
          TF_DB_PASSWORD:    ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_EC2_PUBLIC_KEY: ${{ secrets.TF_VAR_EC2_PUBLIC_KEY }}
          TF_ADMIN_CIDR:     ${{ secrets.TF_VAR_ADMIN_CIDR }}
        run: |
          echo "aws_account_id = \"$TF_ACCOUNT_ID\""      > terraform.tfvars
          echo "environment    = \"$TF_ENVIRONMENT\""    >> terraform.tfvars
          echo "db_password    = \"$TF_DB_PASSWORD\""    >> terraform.tfvars
          echo "ec2_public_key = \"$TF_EC2_PUBLIC_KEY\"" >> terraform.tfvars
          echo "admin_cidr     = \"$TF_ADMIN_CIDR\""     >> terraform.tfvars

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -input=false \
            -no-color \
            2>&1 | tee plan_output.txt

          echo "## Terraform Plan - ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ------------------------------------------------------------------
      # Cleanup - supprimer RDS + subnet group si dans le mauvais VPC
      # ------------------------------------------------------------------
      - name: Cleanup ressources dans mauvais VPC
        if: inputs.action == 'apply'
        run: |
          ENV="${{ inputs.environment }}"
          VPC_ID="vpc-0dcc2ebc834a09cc6"
          REGION="${{ env.AWS_REGION }}"

          SG_VPC=$(aws rds describe-db-subnet-groups \
            --db-subnet-group-name "vpp-italia-${ENV}" \
            --query 'DBSubnetGroups[0].VpcId' \
            --output text --region "${REGION}" 2>/dev/null || echo "")

          if [ -n "$SG_VPC" ] && [ "$SG_VPC" != "None" ] && [ "$SG_VPC" != "${VPC_ID}" ]; then
            echo "DB subnet group dans VPC ${SG_VPC} (cible: ${VPC_ID}) — nettoyage necessaire."

            RDS_STATUS=$(aws rds describe-db-instances \
              --db-instance-identifier "vpp-italia-${ENV}" \
              --query 'DBInstances[0].DBInstanceStatus' \
              --output text --region "${REGION}" 2>/dev/null || echo "")

            if [ -n "$RDS_STATUS" ] && [ "$RDS_STATUS" != "None" ]; then
              echo "Suppression RDS vpp-italia-${ENV} (status: ${RDS_STATUS})..."
              aws rds delete-db-instance \
                --db-instance-identifier "vpp-italia-${ENV}" \
                --skip-final-snapshot \
                --region "${REGION}" || true
              echo "Attente suppression RDS (jusqu a 20 min)..."
              aws rds wait db-instance-deleted \
                --db-instance-identifier "vpp-italia-${ENV}" \
                --region "${REGION}" || true
            fi

            aws rds delete-db-subnet-group \
              --db-subnet-group-name "vpp-italia-${ENV}" \
              --region "${REGION}" || true
            echo "Nettoyage termine."
          else
            echo "DB subnet group absent ou deja dans le bon VPC — rien a faire."
          fi

      # ------------------------------------------------------------------
      # Import - decouverte dynamique des ressources existantes
      # ------------------------------------------------------------------
      - name: Terraform import ressources existantes
        if: inputs.action == 'apply'
        env:
          TF_VAR_AWS_ACCOUNT_ID: ${{ secrets.TF_VAR_AWS_ACCOUNT_ID }}
        run: |
          ENV="${{ inputs.environment }}"
          ACCOUNT_ID="${TF_VAR_AWS_ACCOUNT_ID}"
          VPC_ID="vpc-0dcc2ebc834a09cc6"
          REGION="${{ env.AWS_REGION }}"

          imp() {
            terraform import -var-file=terraform.tfvars -input=false "$1" "$2" 2>/dev/null || true
          }

          aws_id() {
            local r
            r=$(aws "$@" --output text --region "${REGION}" 2>/dev/null || echo "")
            [ "$r" = "None" ] && echo "" || echo "$r"
          }

          IGW_ID=$(aws_id ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
            --query 'InternetGateways[0].InternetGatewayId')
          [ -n "$IGW_ID" ] && imp aws_internet_gateway.main "$IGW_ID"

          PUB_SN=$(aws_id ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidrBlock,Values=10.0.1.0/24" \
            --query 'Subnets[0].SubnetId')
          [ -n "$PUB_SN" ] && imp aws_subnet.public "$PUB_SN"

          PRIV_A=$(aws_id ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidrBlock,Values=10.0.10.0/24" \
            --query 'Subnets[0].SubnetId')
          [ -n "$PRIV_A" ] && imp aws_subnet.private_a "$PRIV_A"

          PRIV_B=$(aws_id ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidrBlock,Values=10.0.11.0/24" \
            --query 'Subnets[0].SubnetId')
          [ -n "$PRIV_B" ] && imp aws_subnet.private_b "$PRIV_B"

          SG_API=$(aws_id ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=group-name,Values=vpp-api-${ENV}" \
            --query 'SecurityGroups[0].GroupId')
          [ -n "$SG_API" ] && imp aws_security_group.api "$SG_API"

          SG_RDS=$(aws_id ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=group-name,Values=vpp-rds-${ENV}" \
            --query 'SecurityGroups[0].GroupId')
          [ -n "$SG_RDS" ] && imp aws_security_group.rds "$SG_RDS"

          RT_ID=$(aws_id ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=vpp-rt-public-${ENV}" \
            --query 'RouteTables[0].RouteTableId')
          [ -n "$RT_ID" ] && imp aws_route_table.public "$RT_ID"

          if [ -n "$PUB_SN" ] && [ -n "$RT_ID" ]; then
            imp aws_route_table_association.public "${PUB_SN}/${RT_ID}"
          fi

          EIP_ALLOC=$(aws_id ec2 describe-addresses \
            --filters "Name=tag:Name,Values=vpp-eip-api-${ENV}" \
            --query 'Addresses[0].AllocationId')
          [ -n "$EIP_ALLOC" ] && imp aws_eip.api "$EIP_ALLOC"

          EC2_ID=$(aws_id ec2 describe-instances \
            --filters "Name=tag:Name,Values=vpp-api-${ENV}" \
                      "Name=instance-state-name,Values=running,stopped,pending" \
            --query 'Reservations[0].Instances[0].InstanceId')
          [ -n "$EC2_ID" ] && imp aws_instance.api "$EC2_ID"

          RDS_ID=$(aws_id rds describe-db-instances \
            --db-instance-identifier "vpp-italia-${ENV}" \
            --query 'DBInstances[0].DBInstanceIdentifier')
          [ -n "$RDS_ID" ] && imp aws_db_instance.timescaledb "$RDS_ID"

          imp aws_db_subnet_group.main                      "vpp-italia-${ENV}"
          imp aws_iam_role.ec2_api                          "vpp-ec2-api-${ENV}"
          imp aws_iam_instance_profile.ec2_api              "vpp-ec2-api-${ENV}"
          imp aws_key_pair.deploy                           "vpp-deploy-${ENV}"
          imp aws_s3_bucket.logs                            "vpp-italia-logs-${ENV}-${ACCOUNT_ID}"
          imp aws_s3_bucket.backups                         "vpp-italia-backups-${ENV}-${ACCOUNT_ID}"
          imp aws_secretsmanager_secret.db_url              "vpp-italia/${ENV}/database-url"
          imp aws_secretsmanager_secret.jwt_secret          "vpp-italia/${ENV}/jwt-secret-key"
          imp aws_secretsmanager_secret.gme_password        "vpp-italia/${ENV}/gme-api-password"
          imp aws_secretsmanager_secret.terna_client_secret "vpp-italia/${ENV}/terna-client-secret"
          imp aws_cloudwatch_log_group.api                  "/vpp/api/${ENV}"
          imp aws_db_parameter_group.timescaledb            "vpp-timescaledb-${ENV}"

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -input=false \
            -auto-approve \
            -no-color
          echo "## Apply termine" >> $GITHUB_STEP_SUMMARY

      - name: Afficher les outputs Terraform
        if: inputs.action == 'apply'
        id: tf_outputs
        run: |
          echo "## Outputs Terraform" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output -no-color 2>&1 | tee outputs.txt
          cat outputs.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          EC2_IP=$(terraform output -raw ec2_public_ip 2>/dev/null || echo "")
          RDS_EP=$(terraform output -raw rds_endpoint  2>/dev/null || echo "")
          S3_LOGS=$(terraform output -raw s3_logs_bucket_name 2>/dev/null || echo "")
          S3_BACK=$(terraform output -raw s3_backups_bucket_name 2>/dev/null || echo "")

          echo "ec2_ip=$EC2_IP"         >> $GITHUB_OUTPUT
          echo "rds_endpoint=$RDS_EP"   >> $GITHUB_OUTPUT
          echo "s3_logs=$S3_LOGS"       >> $GITHUB_OUTPUT
          echo "s3_backups=$S3_BACK"    >> $GITHUB_OUTPUT

          echo "  EC2 IP publique   : $EC2_IP"
          echo "  RDS endpoint      : $RDS_EP"

      # ------------------------------------------------------------------
      # Post-apply : parametres SSM (lus par userdata.sh et vpp-deploy)
      # ------------------------------------------------------------------
      - name: Provisionner les parametres SSM
        if: inputs.action == 'apply'
        env:
          EC2_IP:   ${{ steps.tf_outputs.outputs.ec2_ip }}
          RDS_EP:   ${{ steps.tf_outputs.outputs.rds_endpoint }}
          ENV:      ${{ inputs.environment }}
          DB_PASS:  ${{ secrets.TF_VAR_DB_PASSWORD }}
          JWT_KEY:  ${{ secrets.SSM_JWT_SECRET_KEY }}
          GME_PASS: ${{ secrets.SSM_GME_API_PASSWORD }}
          TERNA_SC: ${{ secrets.SSM_TERNA_CLIENT_SECRET }}
          HW_SC:    ${{ secrets.SSM_HUAWEI_CLIENT_SECRET }}
        run: |
          PREFIX="/vpp-italia/$ENV"
          REGION="${{ env.AWS_REGION }}"

          put_param() {
            local name="$1" value="$2"
            aws ssm put-parameter \
              --name "$PREFIX/$name" \
              --value "$value" \
              --type SecureString \
              --overwrite \
              --region "$REGION" \
              --no-cli-pager
            echo "  SSM $PREFIX/$name OK"
          }

          DB_URL="postgresql+asyncpg://vpp:${DB_PASS}@${RDS_EP}/vpp_italia"
          put_param "database-url"         "$DB_URL"
          put_param "jwt-secret-key"       "$JWT_KEY"
          put_param "gme-api-password"     "$GME_PASS"
          put_param "terna-client-secret"  "$TERNA_SC"
          put_param "huawei-client-secret" "$HW_SC"

          echo "Parametres SSM provisionnes." >> $GITHUB_STEP_SUMMARY

      # ------------------------------------------------------------------
      # Redemarrer l API via SSM Run Command pour charger les nouveaux secrets
      # ------------------------------------------------------------------
      - name: Redemarrer vpp-api avec les secrets SSM
        if: inputs.action == 'apply'
        env:
          EC2_IP: ${{ steps.tf_outputs.outputs.ec2_ip }}
        run: |
          REGION="${{ env.AWS_REGION }}"
          ENV="${{ inputs.environment }}"

          # Trouver l instance EC2 par IP
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=${EC2_IP}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text --region "${REGION}" 2>/dev/null || echo "")

          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            echo "Redemarrage vpp-api sur $INSTANCE_ID..."
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["systemctl restart vpp-api && sleep 5 && systemctl is-active vpp-api"]' \
              --region "${REGION}" \
              --query 'Command.CommandId' --output text)
            sleep 15
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "${REGION}" \
              --query '[Status,StandardOutputContent]' \
              --output text 2>/dev/null || echo "SSM Run Command non disponible (normal au premier boot)"
          else
            echo "Instance non encore disponible pour SSM — l API demarrera automatiquement."
          fi

      # ------------------------------------------------------------------
      # Smoke test — non bloquant (l EC2 peut encore etre en cours de boot)
      # ------------------------------------------------------------------
      - name: Smoke test API
        if: inputs.action == 'apply'
        env:
          EC2_IP: ${{ steps.tf_outputs.outputs.ec2_ip }}
        run: |
          echo "Verification API sur http://$EC2_IP:8000/health (10 min max)..."
          API_OK=false
          for i in $(seq 1 60); do
            STATUS=$(curl -sf --max-time 5 "http://$EC2_IP:8000/health" \
                     -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API operationnelle (tentative $i/60)"
              curl -s "http://$EC2_IP:8000/health" | python3 -m json.tool
              API_OK=true
              break
            fi
            echo "  [${i}/60] HTTP $STATUS — nouvelle tentative dans 10s..."
            sleep 10
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$API_OK" = "true" ]; then
            echo "## API opérationnelle" >> $GITHUB_STEP_SUMMARY
            echo "http://$EC2_IP:8000/docs" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ API pas encore prête" >> $GITHUB_STEP_SUMMARY
            echo "L'infra est déployée. L'API démarre en arrière-plan (userdata ~5-10 min)." >> $GITHUB_STEP_SUMMARY
            echo "Vérifier manuellement : http://$EC2_IP:8000/health" >> $GITHUB_STEP_SUMMARY
            echo "Logs EC2 : ssh ubuntu@$EC2_IP 'journalctl -u vpp-api -n 50'" >> $GITHUB_STEP_SUMMARY
            echo "AVERTISSEMENT : API non accessible apres 10 min — verifier les logs EC2"
            # Pas de exit 1 — l infra est deployee, l API demarrera
          fi

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        run: |
          echo "DESTRUCTION de l infrastructure ${{ inputs.environment }}..."
          terraform destroy \
            -var-file=terraform.tfvars \
            -input=false \
            -auto-approve \
            -no-color
          echo "## Infrastructure ${{ inputs.environment }} detruite" >> $GITHUB_STEP_SUMMARY

      - name: Nettoyer les fichiers sensibles
        if: always()
        run: rm -f terraform.tfvars tfplan
